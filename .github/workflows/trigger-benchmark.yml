name: Benchmark on taipy-integration-testing
on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      github_sha:
        description: "The commit SHA to be benchmarked"
        default: ""
        required: true
      timestamp:
        description: "The timestamp of the github SHA to be benchmarked"
        default: ""
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger taipy-benchmark computation on push to develop
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAIPY_INTEGRATION_TESTING_ACCESS_TOKEN }}
          repository: avaiga/taipy-benchmark
          event-type: benchmark
          client-payload: '{"repo": "taipy", "commitSHA": "${{ github.sha }}", "commit_timestamp": ""}'

      - name: Trigger taipy-benchmark computation on workflow_dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAIPY_INTEGRATION_TESTING_ACCESS_TOKEN }}
          repository: avaiga/taipy-benchmark
          event-type: benchmark
          client-payload: '{"repo": "taipy", "commitSHA": "${{ github.event.inputs.github_sha }}", "commit_timestamp": "${{ github.event.inputs.timestamp }}"}'
